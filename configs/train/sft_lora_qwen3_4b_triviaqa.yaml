### model
model_name_or_path: /mnt/sharedata/ssd_large/common/LLMs/Qwen3-4B-Instruct-2507
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all
deepspeed: ds_config/zero2.json  # choices: [ds_config/zero2.json, ds_config/zero3.json]

### dataset
dataset: triviaqa_train
template: qwen3_nothink
cutoff_len: 512  # trivia_qa for short questions
max_samples: 20000
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: runs/qwen3-4b/lora/sft_triviaqa
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
do_eval: true
eval_dataset: triviaqa_val
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 500
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
early_stopping_steps: 3  # maps to EarlyStoppingCallback patience in LlamaFactory
